name: Check race results

on:
  workflow_dispatch:          # gives you a manual "Run" button
  schedule:
    - cron: "*/5 * * * *"     # runs about every 5 minutes

permissions:
  contents: write             # lets it remember what it last saw

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the checker
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: node check.js
      - name: Remember this result
        run: |
          git config user.name "results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "update results snapshot" || echo "no change to save"
          git push
